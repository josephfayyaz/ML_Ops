apiVersion: apps/v1
kind: Deployment
metadata:
  name: katib-results-dashboard
  namespace: mlops-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katib-results-dashboard
  template:
    metadata:
      labels:
        app: katib-results-dashboard
    spec:
      serviceAccountName: katib-results-dashboard
      containers:
        - name: katib-results-dashboard
          image: mlops-demo:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - mlops_results_dashboard.app
          env:
            - name: KATIB_NAMESPACE
              value: katib-experiments
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /api/experiments
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/experiments
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
