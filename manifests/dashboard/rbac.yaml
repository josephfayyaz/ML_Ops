apiVersion: v1
kind: ServiceAccount
metadata:
  name: katib-results-dashboard
  namespace: mlops-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: katib-results-reader
  namespace: katib-experiments
rules:
  - apiGroups:
      - kubeflow.org
    resources:
      - experiments
      - trials
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: katib-results-dashboard-reader
  namespace: katib-experiments
subjects:
  - kind: ServiceAccount
    name: katib-results-dashboard
    namespace: mlops-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: katib-results-reader
