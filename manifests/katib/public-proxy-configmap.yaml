apiVersion: v1
kind: ConfigMap
metadata:
  name: katib-public-proxy
  namespace: kubeflow
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      location = / {
        return 302 /katib/;
      }

      location / {
        proxy_pass http://katib-ui.kubeflow.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }

