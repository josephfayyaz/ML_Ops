apiVersion: kubeflow.org/v1beta1
kind: Experiment
metadata:
  name: house-prices-random-search-01
  namespace: katib-experiments
spec:
  objective:
    type: minimize
    objectiveMetricName: rmse
    goal: 30000
  algorithm:
    algorithmName: random
  parallelTrialCount: 1
  maxTrialCount: 6
  maxFailedTrialCount: 3
  metricsCollectorSpec:
    collector:
      kind: StdOut
  parameters:
    - name: n_estimators
      parameterType: int
      feasibleSpace:
        min: "80"
        max: "320"
    - name: max_depth
      parameterType: int
      feasibleSpace:
        min: "4"
        max: "20"
    - name: min_samples_split
      parameterType: int
      feasibleSpace:
        min: "2"
        max: "12"
    - name: min_samples_leaf
      parameterType: int
      feasibleSpace:
        min: "1"
        max: "6"
  trialTemplate:
    primaryContainerName: trainer
    trialParameters:
      - name: nEstimators
        description: Number of trees
        reference: n_estimators
      - name: maxDepth
        description: Maximum tree depth
        reference: max_depth
      - name: minSamplesSplit
        description: Minimum samples needed to split a node
        reference: min_samples_split
      - name: minSamplesLeaf
        description: Minimum samples required at a leaf node
        reference: min_samples_leaf
    trialSpec:
      apiVersion: batch/v1
      kind: Job
      spec:
        backoffLimit: 0
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: trainer
                image: mlops-demo:0.2.0
                imagePullPolicy: IfNotPresent
                command:
                  - python
                  - -m
                  - mlops_house_prices.katib_objective
                  - --n-estimators=${trialParameters.nEstimators}
                  - --max-depth=${trialParameters.maxDepth}
                  - --min-samples-split=${trialParameters.minSamplesSplit}
                  - --min-samples-leaf=${trialParameters.minSamplesLeaf}
