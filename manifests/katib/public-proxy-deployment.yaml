apiVersion: apps/v1
kind: Deployment
metadata:
  name: katib-public-proxy
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katib-public-proxy
  template:
    metadata:
      labels:
        app: katib-public-proxy
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: katib-public-proxy

