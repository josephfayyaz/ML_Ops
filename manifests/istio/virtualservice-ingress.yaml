apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: mlops-ingress
  namespace: istio-ingress
spec:
  hosts:
    - "*"
  gateways:
    - mlops-gateway
  http:
    - match:
        - uri:
            exact: /katib
      redirect:
        uri: /katib/
    - match:
        - uri:
            exact: /dashboard_lib.bundle.js
      directResponse:
        status: 200
        body:
          string: "/* standalone Katib does not ship the Kubeflow dashboard bundle */"
      headers:
        response:
          set:
            content-type: application/javascript
    - match:
        - uri:
            prefix: /katib/
      route:
        - destination:
            host: katib-ui.kubeflow.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            exact: /iris
      redirect:
        uri: /iris/
    - match:
        - uri:
            prefix: /iris/
      rewrite:
        uri: /
      route:
        - destination:
            host: iris-service.mlops-apps.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: vscode.dev-workspace.svc.cluster.local
            port:
              number: 8080
